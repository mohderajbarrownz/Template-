<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Infinite Drag Slider</title>

    <link rel="stylesheet" href="./assest/Bootstrap/css/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            user-select: none;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 20px 0;
        }

        /* Slider Flex */
        .slider {
            display: flex;
            overflow-x: hidden;
            cursor: grab;
            gap: 0;
        }

        .slider:active {
            cursor: grabbing;
        }

        /* Each slide box */
        .slide-box {
            min-width: 350px;
            /* controls width */
            flex: 0 0 auto;
            padding: 0 10px;
        }

        .slide-box img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            pointer-events: none;
        }

        /* Buttons */
        .btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 35px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: none;
            padding: 10px 18px;
            cursor: pointer;
            z-index: 10;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .left-btn {
            left: 10px;
        }

        .right-btn {
            right: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="slider-wrapper">

            <button class="btn left-btn" id="leftBtn">&#10094;</button>
            <button class="btn right-btn" id="rightBtn">&#10095;</button>

            <div class="slider" id="slider">

                <div class="slide-box col-lg-3">
                    <img src="./Image/hotel-glasses.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/hotel-cooking.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/slide2-free-img.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/slide1-free-img.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/hotel-massage.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/slide5-free-img.jpg">
                </div>

                <div class="slide-box col-lg-3">
                    <img src="./Image/hotel-dish.jpg">
                </div>

            </div>
        </div>
    </div>


    <script>
        const slider = document.getElementById("slider");

        // Duplicate slides for infinite scroll
        function duplicateSlides() {
            const slides = [...slider.children];
            slides.forEach(slide => slider.appendChild(slide.cloneNode(true)));
        }
        duplicateSlides();

        // Drag feature
        let isDown = false;
        let startX;
        let scrollStart;

        slider.addEventListener("mousedown", e => {
            isDown = true;
            startX = e.pageX;
            scrollStart = slider.scrollLeft;
        });

        slider.addEventListener("mouseup", () => isDown = false);
        slider.addEventListener("mouseleave", () => isDown = false);

        slider.addEventListener("mousemove", e => {
            if (!isDown) return;
            let walk = (e.pageX - startX) * 1.3;
            slider.scrollLeft = scrollStart - walk;
        });

        // Infinite Loop Logic
        slider.addEventListener("scroll", () => {
            const max = slider.scrollWidth / 2;

            if (slider.scrollLeft >= max) slider.scrollLeft = 1;
            if (slider.scrollLeft <= 0) slider.scrollLeft = max - 1;
        });

        // Smooth Manual Animation
        function smoothScroll(target) {
            let start = slider.scrollLeft;
            let distance = target - start;
            let duration = 350;
            let startTime = performance.now();

            function animate(time) {
                let timePassed = time - startTime;
                let progress = Math.min(timePassed / duration, 1);
                slider.scrollLeft = start + distance * progress;

                if (progress < 1) requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // Button click
        const step = 350; // width move per click

        document.getElementById("rightBtn").addEventListener("click", () => {
            smoothScroll(slider.scrollLeft + step);
        });

        document.getElementById("leftBtn").addEventListener("click", () => {
            smoothScroll(slider.scrollLeft - step);
        });
    </script>

</body>

</html>
